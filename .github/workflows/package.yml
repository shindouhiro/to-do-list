name: "Package Apps"

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  package:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install app dependencies
        run: pnpm install

      - name: Rename Product Name for clarity
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Windows sed 语法略有不同，但 actions 环境通常是 bash/git bash
            sed -i 's/"productName": "GTD"/"productName": "GTD-Windows"/g' src-tauri/tauri.conf.json
          else
            # macOS
            sed -i '' 's/"productName": "GTD"/"productName": "GTD-MacOS"/g' src-tauri/tauri.conf.json
          fi

      - name: build and package
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "macos-latest" ]; then
            pnpm tauri build --target universal-apple-darwin
          else
            pnpm tauri build
          fi

      - name: upload app bundles
        uses: actions/upload-artifact@v4
        with:
          name: GTD-${{ matrix.platform }}
          if-no-files-found: error
          path: |
            src-tauri/target/release/bundle/**/*.app
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.app
            src-tauri/target/universal-apple-darwin/release/bundle/**/*.dmg

      - name: collect macOS release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'macos-latest'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets

          find src-tauri/target/universal-apple-darwin/release/bundle \
            -type f -name '*.dmg' \
            -exec cp '{}' release-assets/ \;

          while IFS= read -r app; do
            app_name="$(basename "$app" .app)"
            ditto -c -k --sequesterRsrc --keepParent "$app" "release-assets/${app_name}-universal-macos.app.zip"
          done < <(find src-tauri/target/universal-apple-darwin/release/bundle -type d -name '*.app')

          ls -la release-assets

      - name: collect Windows release assets
        if: startsWith(github.ref, 'refs/tags/v') && matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -File -Include *.msi,*.exe |
            Copy-Item -Destination release-assets -Force
          Get-ChildItem release-assets

      - name: upload bundles to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          assets=(release-assets/*)

          if [ ${#assets[@]} -eq 0 ]; then
            echo "No release assets were collected."
            exit 1
          fi

          for attempt in {1..30}; do
            if gh release view "$TAG_NAME" >/dev/null 2>&1; then
              break
            fi
            sleep 10
          done

          if ! gh release view "$TAG_NAME" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" --title "$TAG_NAME" --generate-notes
          fi

          gh release upload "$TAG_NAME" "${assets[@]}" --clobber
