version: '3.8'

services:
  calendar-todo:
    image: shindouhiro/calendar-todo:latest
    ports:
      - "3003:3001"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    environment:
      - GTD_MODE=server
      - NODE_ENV=production
      - DB_PATH=/app/data/todo.db
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-before-production}
