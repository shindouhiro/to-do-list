name: "Package Apps"

on:
  push:
    branches:
      - main
      - master
      - codex/tauri-macos-windows-backend
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  package:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: install app dependencies
        run: pnpm install

      - name: prepare resources
        run: pnpm tauri:prepare

      - name: Rename Product Name for clarity
        shell: bash
        run: |
          if [ "${{ matrix.platform }}" == "windows-latest" ]; then
            # Windows sed 语法略有不同，但 actions 环境通常是 bash/git bash
            sed -i 's/"productName": "GTD"/"productName": "GTD-Windows"/g' src-tauri/tauri.conf.json
          else
            # macOS
            sed -i '' 's/"productName": "GTD"/"productName": "GTD-MacOS"/g' src-tauri/tauri.conf.json
          fi

      - name: build and package
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: "App Release v__VERSION__"
          releaseBody: "Automated high-performance build."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.platform == 'macos-latest' && '--target universal-apple-darwin' || '' }}
